<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/layout :: head('Carrito')}"></th:block>
    <link rel="stylesheet" th:href="@{/css/carclient.css}">
</head>

<body>
<div th:replace="~{fragments/navbar-client :: navbar}"></div>

<main class="cart-page">
    <section class="cart-layout">
        <section class="cart-items">
            <p style="text-align:center;padding:40px;color:var(--text-secondary);">Cargando carrito...</p>
        </section>

        <aside class="summary-card">
            <h1>Resumen del pedido</h1>

            <div class="summary-row">
                <span>Subtotal</span>
                <strong id="subtotal">S/ 2,100.00</strong>
            </div>

            <div class="summary-row">
                <span>Envió</span>
                <strong class="free">Gratis</strong>
            </div>

            <div class="summary-row">
                <span>IGV(18%)</span>
                <strong id="tax">S/ 378.00</strong>
            </div>

            <div class="total-row">
                <span>Total</span>
                <strong id="total">S/ 2,478.00</strong>
            </div>

            <form class="payment-form">
                <h3>Dirección de envío</h3>
                <input type="text" name="direccion" placeholder="Dirección completa" required>
                <input type="text" name="ciudad" placeholder="Ciudad" required>

                <label>MÉTODO DE PAGO</label>
                <input type="text" placeholder="Número de tarjeta">

                <div class="payment-grid">
                    <input type="text" placeholder="MM/AA">
                    <input type="text" placeholder="CVV">
                </div>

                <input type="text" placeholder="Nombre en la tarjeta">

                <button type="submit">Confirmar y Pagar 🔒</button>
            </form>
        </aside>
    </section>
</main>

<script th:src="@{/js/carclient.js}"></script>
</body>

</html>
