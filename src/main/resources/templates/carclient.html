<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/layout :: head('Carrito')}"></th:block>
    <link rel="stylesheet" th:href="@{/css/carclient.css}">
</head>

<body>
<div th:replace="~{fragments/navbar-client :: navbar}"></div>

<main class="cart-page">
    <section class="cart-layout">
        <section class="cart-items">
            <a class="continue-btn" th:href="@{/catalogclient}">Seguir comprando</a>

            <article class="cart-item" data-price="1120">
                <div class="item-image">🖥️</div>

                <div class="item-info">
                    <h2>Módulo Remoto Schneider TM3</h2>
                    <p>SKU: MR-002 · MÓDULO REMOTO</p>

                    <div class="quantity">
                        <button type="button" class="qty-btn minus">-</button>
                        <strong class="qty-value">1</strong>
                        <button type="button" class="qty-btn plus">+</button>
                    </div>
                </div>

                <strong class="item-price">S/ 1,120.00</strong>
                <button type="button" class="remove-btn">X</button>
            </article>

            <article class="cart-item" data-price="980">
                <div class="item-image">📡</div>

                <div class="item-info">
                    <h2>Módulo ET 200SP Siemens</h2>
                    <p>SKU: MR-001 · MÓDULO REMOTO</p>

                    <div class="quantity">
                        <button type="button" class="qty-btn minus">-</button>
                        <strong class="qty-value">1</strong>
                        <button type="button" class="qty-btn plus">+</button>
                    </div>
                </div>

                <strong class="item-price">S/ 980.00</strong>
                <button type="button" class="remove-btn">X</button>
            </article>
        </section>

        <aside class="summary-card">
            <h1>Resumen del pedido</h1>

            <div class="summary-row">
                <span>Subtotal</span>
                <strong id="subtotal">S/ 2,100.00</strong>
            </div>

            <div class="summary-row">
                <span>Envió</span>
                <strong class="free">Gratis</strong>
            </div>

            <div class="summary-row">
                <span>IGV(18%)</span>
                <strong id="tax">S/ 378.00</strong>
            </div>

            <div class="total-row">
                <span>Total</span>
                <strong id="total">S/ 2,478.00</strong>
            </div>

            <form class="payment-form">
                <label>MÉTODO DE PAGO</label>
                <input type="text" placeholder="Número de tarjeta">

                <div class="payment-grid">
                    <input type="text" placeholder="MM/AA">
                    <input type="text" placeholder="CVV">
                </div>

                <input type="text" placeholder="Nombre en la tarjeta">

                <button type="submit">Confirmar y Pagar 🔒</button>
            </form>
        </aside>
    </section>
</main>

<script th:src="@{/js/carclient.js}"></script>
</body>

</html>
