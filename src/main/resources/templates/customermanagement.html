<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/layout :: head('Control de Clientes')}"></th:block>
    <link rel="stylesheet" th:href="@{/css/customermanagement.css}">
</head>

<body>

<div th:replace="~{fragments/navbar-admin :: navbar}"></div>

<main class="admin-page">

    <div class="admin-shell">

        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar-admin :: sidebar(activeLink='customermanagement')}"></div>

        <!-- Contenido -->
        <section class="content">

            <header class="content-header">

                <div>
                    <h1>CLIENTES</h1>
                    <p>Gestión de clientes registrados</p>
                </div>

                <button type="button"
                        class="new-user-btn"
                        id="newUserBtn">
                    + Nuevo cliente
                </button>

            </header>

            <section class="users-table-card">

                <table>

                    <thead>
                    <tr>
                        <th>CLIENTE</th>
                        <th>CONTACTO</th>
                        <th>ESTADO</th>
                        <th>ACCIONES</th>
                    </tr>
                    </thead>

                    <tbody id="customerTableBody"
                           data-customers-table>

                    <tr>
                        <td colspan="4">
                            Cargando clientes...
                        </td>
                    </tr>

                    </tbody>

                </table>

            </section>

        </section>

    </div>

</main>

<script th:src="@{/js/customermanagement.js}"></script>

</body>
</html>
