<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/layout :: head('Control de Usuarios')}"></th:block>
    <link rel="stylesheet" th:href="@{/css/customermanagement.css}">
</head>

<body>
<div th:replace="~{fragments/navbar-admin :: navbar}"></div>
<!-- Sidebar a la izquierda -->
<div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>
<main class="page-shell">
        <section class="content">
            <header class="content-header">
                <div>
                    <h1>REPORTES</h1>
                    <p>Reportes del sistema — exportables en Excel y PDF</p>
                </div>

                <button type="button" class="new-user-btn" id="newUserBtn">+ Nuevo usuario</button>
            </header>

            <section class="users-table-card">
                <table>
                    <thead>
                    <tr>
                        <th>NOMBRE</th>
                        <th>EMAIL</th>
                        <th>PEDIDOS</th>
                        <th>ACCIONES</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td>Admin Sistema</td>
                        <td>admin@allprocess.com</td>
                        <td><span class="badge admin">ADMIN</span></td>
                        <td>
                            <button type="button" class="table-btn reset">🔑 Reset Pass</button>
                            <button type="button" class="table-btn edit">✎ Editar</button>
                        </td>
                    </tr>

                    <tr>
                        <td>Juan Trabajador</td>
                        <td>juan@allprocess.com</td>
                        <td><span class="badge worker">TRABAJAR</span></td>
                        <td>
                            <button type="button" class="table-btn reset">🔑 Reset Pass</button>
                            <button type="button" class="table-btn edit">✎ Editar</button>
                        </td>
                    </tr>

                    <tr>
                        <td>Adrian Cliente</td>
                        <td>carlos@allprocess.com</td>
                        <td><span class="badge client">CLIENTE</span></td>
                        <td>
                            <button type="button" class="table-btn reset">🔑 Reset Pass</button>
                            <button type="button" class="table-btn edit">✎ Editar</button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </section>
        </section>
</main>

<script th:src="@{/js/customermanagement.js}"></script>
</body>

</html>
