<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
    <header th:fragment="navbar" class="topbar">
        <a th:href="@{/homeworker}" class="brand" aria-label="Inicio">
            <img th:src="@{/img/allprocess_logo.png}" style="width:25px; height:25px" alt="Logo" loading="lazy">
            <span class="brand-text">ALL PROCESS - STAFF</span>
        </a>

        <button class="menu-toggle" id="menuToggle" type="button" aria-expanded="false" aria-controls="mainNav">
            <span></span><span></span><span></span>
        </button>

        <nav class="main-nav" id="mainNav">
            <a th:href="@{/homeworker}">Dashboard</a>
            <a th:href="@{/ordermanagement}">Pedidos</a>
            <a th:href="@{/customermanagement}">Usuarios</a>
            <a th:href="@{/usermanagement}">Cliente</a>
        </nav>

        <div class="admin-profile" style="display: flex; gap: 15px; align-items: center;">
            <a th:href="@{/profile}" class="profile-pill" style="display:flex; align-items:center; gap:8px; background:var(--bg-main); padding:4px 12px; border-radius:20px;">
                <img th:src="@{/img/user.png}" alt="Worker Avatar" style="width:24px; height:24px; border-radius:50%;" loading="lazy">
                <strong>Trabajador</strong>
            </a>
            <a class="button button-light" th:href="@{/login}">Salir</a>
        </div>
    </header>
</body>
</html>
