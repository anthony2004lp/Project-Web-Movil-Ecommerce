<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="sidebar" th:fragment="sidebar(activeLink)">
    <nav>
        <section class="menu-section">
            <h3>PRINCIPAL</h3>
            <div class="menu-items">
                <a th:href="@{/homeadmin}"
                   class="menu-item"
                   th:classappend="${activeLink == 'dashboard'} ? 'active'">
                    <span>📊</span>
                    Dashboard
                </a>
                <a th:href="@{/ordermanagement}"
                   class="menu-item"
                   th:classappend="${activeLink == 'ordermanagement'} ? 'active'">
                    <span>📦</span>
                    Pedidos
                </a>
            </div>
        </section>
        <section class="menu-section">
            <h3>CATÁLOGO</h3>
            <div class="menu-items">
                <a th:href="@{/productmanagement}"
                   class="menu-item"
                   th:classappend="${activeLink == 'productmanagement'} ? 'active'">
                    <span>🏷️</span>
                    Productos
                </a>
            </div>
        </section>
        <section class="menu-section">
            <h3>USUARIO</h3>
            <div class="menu-items">
                <a th:href="@{/usermanagement}"
                   class="menu-item"
                   th:classappend="${activeLink == 'usermanagement'} ? 'active'">
                    <span>👥</span>
                    Usuarios
                </a>
                <a th:href="@{/customermanagement}"
                   class="menu-item"
                   th:classappend="${activeLink == 'customermanagement'} ? 'active'">
                    <span>🛒</span>
                    Clientes
                </a>
            </div>
        </section>
        <section class="menu-section">
            <h3>REPORTES</h3>
            <div class="menu-items">
                <a th:href="@{/adminreports}"
                   class="menu-item"
                   th:classappend="${activeLink == 'adminreports'} ? 'active'">
                    <span>📈</span>
                    Reportes
                </a>
            </div>
        </section>
    </nav>
</aside>
</body>
</html>
