<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('Sidebar Admin')}"></th:block>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .sidebar {
            width: 220px;
            min-height: 100vh;
            padding: 25px 10px;

            background: linear-gradient(
                90deg,
                #ffffff 0%,
                #faf8ff 45%,
                #f0edff 100%
            );
        }

        .menu-section {
            margin-bottom: 20px;
        }

        .menu-section h3 {
            margin: 0 0 12px;

            font-size: 11px;
            font-weight: 700;
            color: #6f7180;
        }

        /* AQUI ESTA LA MEJORA */
        .menu-items {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 6px;

            padding: 8px 14px;

            border-radius: 8px;

            text-decoration: none;

            font-size: 12px;
            font-weight: 600;

            color: #8a8d99;

            transition: 0.2s;
        }

        .menu-item:hover {
            background: #f5f2ff;
            color: #7b4dff;
        }

        .menu-item.active {
            background: #f0edff;
            border: 1px solid #d8ccff;
            color: #7b4dff;
        }
    </style>
</head>

<body>

<aside class="sidebar" th:fragment="sidebar">

    <nav>

        <section class="menu-section">
            <h3>PRINCIPAL</h3>

            <div class="menu-items">

                <a th:href="@{/homeadmin}"
                   class="menu-item"
                   th:classappend="${currentSection == 'homeadmin'} ? 'active'">

                    <span>📊</span>
                    Dashboard
                </a>

                <a th:href="@{/ordermanagement}"
                   class="menu-item"
                   th:classappend="${currentSection == 'ordermanagement'} ? 'active'">
<br>
                    <span>📦</span>
                    Pedidos
                </a>

            </div>
        </section>

        <section class="menu-section">
            <h3>CATÁLOGO</h3>

            <div class="menu-items">

                <a th:href="@{/productmanagement}"
                   class="menu-item"
                   th:classappend="${currentSection == 'productmanagement'} ? 'active'">

                    <span>🏷️</span>
                    Productos
                </a>

            </div>
        </section>

        <section class="menu-section">
            <h3>USUARIO</h3>

            <div class="menu-items">

                <a th:href="@{/customermanagement}"
                   class="menu-item"
                   th:classappend="${currentSection == 'usuarios'} ? 'active'">

                    <span>👥</span>
                    Usuarios
                </a>

                <a th:href="@{/usermanagement}"
                   class="menu-item"
                   th:classappend="${currentSection == 'usermanagement'} ? 'active'">
<br>
                    <span>🛒</span>
                    Clientes
                </a>

            </div>
        </section>

        <section class="menu-section">
            <h3>REPORTES</h3>

            <div class="menu-items">

                <a th:href="@{/adminreports}"
                   class="menu-item"
                   th:classappend="${currentSection == 'adminreports'} ? 'active'">

                    <span>📈</span>
                    Reportes
                </a>

            </div>
        </section>

    </nav>

</aside>

</body>
</html>
