<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('Panel de Trabajador')}"></th:block>
</head>
<body style="background: var(--bg-main);">
    <div class="page-shell">
        <div th:replace="~{fragments/navbar-worker :: navbar}"></div>

        <div style="display: flex; flex: 1; overflow: hidden;">

            <main style="flex: 1; padding: 30px; overflow-y: auto;">
                <header style="margin-bottom: 2rem;">
                    <h1 style="font-size: 1.75rem; font-weight: 800; color: var(--text-dark);">Operaciones y Logística 📦</h1>
                    <p style="color: var(--text-secondary);">Gestión de pedidos y despacho de productos.</p>
                </header>

                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 2.5rem;">
                    <article class="metric-card metric-info">
                        <h3>Por Procesar</h3>
                        <strong>8</strong>
                        <p>Pedidos en cola de preparación</p>
                    </article>
                    <article class="metric-card metric-warning">
                        <h3>En Almacén</h3>
                        <strong>240</strong>
                        <p>Items listos para inventariar</p>
                    </article>
                </div>

                <section class="table-card">
                    <header class="table-header">
                        <h2 style="font-size: 1.1rem; font-weight: 700;">Cola de Despacho</h2>
                    </header>
                    <div style="padding: 60px 40px; text-align: center;">
                        <img th:src="@{/img/empty_tasks.png}" style="width: 120px; opacity: 0.5; margin-bottom: 1.5rem;" alt="Sin tareas">
                        <h3 style="color: var(--text-dark); margin-bottom: 0.5rem;">Todo al día</h3>
                        <p style="color: var(--text-muted); margin-bottom: 2rem;">No tienes tareas pendientes asignadas para tu turno actual.</p>
                        <button class="button button-primary">Solicitar Tarea Nueva</button>
                    </div>
                </section>
            </main>
        </div>

        <div th:replace="~{fragments/layout :: footer}"></div>
    </div>
</body>
</html>
