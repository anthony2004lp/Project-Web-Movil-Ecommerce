<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/layout :: head('Ingresar')}"></th:block>
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <style>
        /* Estilos para los tabs de rol */
        .role-tabs label {
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0;
        }

        .role-tabs label span {
            transition: all 0.3s ease;
            display: grid;
            place-items: center;
            height: 34px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 800;
            cursor: pointer;
        }

        .role-tabs input[type="radio"] {
            display: none;
        }

        .form-message.error {
            color: #dc3545;
        }

        .form-message.success {
            color: #28a745;
        }

        input.invalid {
            border-color: #dc3545 !important;
            background-color: #fff8f8 !important;
        }
    </style>
</head>

<body>
<div class="page-shell">
    <main style="flex: 1; display: grid; place-items: center; padding: 40px 20px;">
        <section class="register-card"
                 style="width: 100%; max-width: 469px; background: #fff; padding: 60px 35px; border-radius: var(--radius-card); box-shadow: var(--shadow-soft);">
            <header class="brand-block" style="text-align: center; margin-bottom: 2.5rem;">
                <img class="brand-mark" th:src="@{/img/allprocess_logo.png}"
                     style="width: 140px; height: 70px; margin-bottom: 1rem;" alt="Logo">
                <h1 style="font-size: 1.2rem; font-weight: 800; letter-spacing: 2px;">ALL PROCESS S.A.C.</h1>
                <p style="color: var(--text-secondary);font-weight: 600;">Ingresa a tu cuenta</p>
            </header>

            <form id="loginForm" novalidate>
                <!-- Selector de rol -->
                <div class="role-tabs"
                     style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 7px; margin-bottom: 1.5rem; background: #f0f1f5; border-radius: 20px;">

                    <label class="rol-option active">
                        <input type="radio" name="rol" value="CLIENTE" checked>
                        <span>Cliente</span>
                    </label>

                    <label class="rol-option">
                        <input type="radio" name="rol" value="VENDEDOR">
                        <span>Trabajador</span>
                    </label>

                    <label class="rol-option">
                        <input type="radio" name="rol" value="ADMINISTRADOR">
                        <span>Admin</span>
                    </label>
                </div>

                <label class="field" >
                    <span>Correo electrónico</span>
                    <input type="email" name="correo" placeholder="allprocess.com" required>
                </label>

                <label class="field">
                    <span>Contraseña</span>
                    <input type="password" name="password" placeholder="••••••••" required minlength="6">
                </label>

                <p class="form-message" id="formMessage" aria-live="polite"
                   style="text-align: center; min-height: 1.2rem; margin-bottom: 1rem;">
                </p>

                <button type="submit" class="button button-primary"
                        style="width: 100%; border-radius: 15px; background: linear-gradient(135deg, #2368f5, #842ff0); box-shadow: 0 12px 22px rgba(93, 64, 239, 0.35);font-size: 1.05rem;; font-weight: 800">
                    Iniciar sesión
                </button>

                <div style="margin-top: 1.5rem;">
                    <a th:href="@{/forgot-password}"
                       style="display: flex; align-items: center; justify-content: center; gap: 10px; min-height: 68px; border: 1px solid #8de4ac; border-radius: 9px; background: #c7f6d8; color: #2ea850; text-decoration: none; font-weight: 800;">
                        <span style="display: grid; place-items: center; width: 34px; height: 34px; border-radius: 50%; background: #35c85a; color: #fff; font-size: 1.2rem;">☎</span>
                        <span style="line-height: 1.1; font-size: 0.90rem;">
                                ¿Olvidaste tu contraseña?<br>
                                <small style="font-weight: 400; font-size: 0.80rem;">Contáctanos por WhatsApp</small>
                            </span>
                    </a>
                </div>

                <footer class="form-footer"
                        style="margin-top: 2rem; text-align: center; font-size: 0.75rem;font-weight: 700;">
                    ¿Sin cuenta?
                    <a th:href="@{/register}" style="color: var(--primary); font-weight: 700;">Regístrate aquí</a>
                </footer>
            </form>

        </section>
    </main>
</div>

<!-- Scripts separados -->
<script th:src="@{/js/login.js}"></script>
</body>

</html>
