<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/layout :: head('Control de Productos')}"></th:block>
    <link rel="stylesheet" th:href="@{/css/productmanagement.css}">
</head>

<body>

<div th:replace="~{fragments/navbar-admin :: navbar}"></div>

<main class="admin-page">

    <div class="admin-shell">

        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar-admin :: sidebar(activeLink='productmanagement')}"></div>

        <!-- Contenido -->
        <section class="content">

            <header class="content-header">

                <div>
                    <h1>PRODUCTOS</h1>
                    <p>Gestión del catálogo de productos</p>
                </div>

                <button type="button"
                        class="new-product-btn"
                        id="newProductBtn">
                    + Nuevo producto
                </button>

            </header>

            <section class="toolbar">

                <input id="searchInput"
                       type="search"
                       placeholder="🔍 Buscar producto.....">

                <select id="statusFilter">
                    <option value="todos">Todos los estados</option>
                    <option value="activo">Activo</option>
                    <option value="inactivo">Inactivo</option>
                </select>

            </section>

            <section class="product-grid" id="productGrid">

                <article class="admin-product-card">
                    <span class="status-badge inactive">...</span>

                    <div class="product-image">
                        ⌛
                    </div>

                    <h2>Cargando productos...</h2>

                    <p>-</p>
                </article>

            </section>

        </section>

    </div>

</main>

<script type="module" th:src="@{/js/products.js}"></script>
<script type="module" th:src="@{/js/session.js}"></script>

</body>
</html>
