<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/layout :: head('Control de Clientes')}"></th:block>
    <link rel="stylesheet" th:href="@{/css/usermanagement.css}">
</head>

<body>
<div th:replace="~{fragments/navbar-admin :: navbar}"></div>

<main class="page-shell">
        <section class="content">
            <header class="content-header">
                <div>
                    <h1>CLIENTES</h1>

                </div>

                <button type="button" class="new-client-btn" id="newClientBtn">+ Nuevo cliente</button>

            <section class="clients-table-card">

                    <thead>
                    <tr>
                        <th>NOMBRE</th>
                        <th>EMAIL</th>
                        <th>PEDIDOS</th>
                        <th>ACCIONES</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr>
                        <td>Adrian Cliente</td>
                        <td>carlos@allprocess.com</td>
                        <td>3 pedidos</td>
                        <td>
                            <button type="button" class="reset-btn">🔑 Reset Pass</button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </section>
        </section>
</main>

<script th:src="@{/js/usermanagement.js}"></script>
</body>

</html>
