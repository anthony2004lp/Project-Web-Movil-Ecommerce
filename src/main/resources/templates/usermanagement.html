<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - All Process</title>
    <link rel="stylesheet" th:href="@{/css/usermanagement.css}">
</head>

<body>
<header class="topbar">
    <a class="brand" th:href="@{/admin/dashboard}">
        <img th:src="@{/img/allprocess_logo.png}" alt="All Process">
        <strong>ALL PROCESS S.A.C.</strong>
    </a>

    <div class="admin-profile">
        <div class="profile-pill">
            <img th:src="@{/img/avatar.png}" alt="Admin">
            <strong>Admin</strong>
            <span>Admin</span>
        </div>
        <a class="logout-btn" th:href="@{/logout}">Salir</a>
    </div>
</header>

<main class="admin-page">
    <section class="admin-shell">
        <aside class="sidebar">
            <nav>
                <p>PRINCIPAL</p>
                <a th:href="@{/admin/dashboard}">📊Dashboard</a>
                <a th:href="@{/admin/pedidos}">📦Pedidos</a>

                <p>CATÁLOGO</p>
                <a th:href="@{/admin/productos}">📦Productos</a>

                <p>USUARIO</p>
                <a th:href="@{/admin/usuarios}">👥Usuarios</a>
                <a class="active" th:href="@{/admin/clientes}">🛒Clientes</a>

                <p>REPORTES</p>
                <a th:href="@{/admin/reportes}">📈Reportes</a>
            </nav>
        </aside>

        <section class="content">
            <header class="content-header">
                <div>
                    <h1>CLIENTES</h1>
                    <p>Gestión de clientes registrados</p>
                </div>

                <button type="button" class="new-client-btn" id="newClientBtn">+ Nuevo cliente</button>
            </header>

            <section class="clients-table-card">
                <table>
                    <thead>
                    <tr>
                        <th>NOMBRE</th>
                        <th>EMAIL</th>
                        <th>PEDIDOS</th>
                        <th>ACCIONES</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr>
                        <td>Adrian Cliente</td>
                        <td>carlos@allprocess.com</td>
                        <td>3 pedidos</td>
                        <td>
                            <button type="button" class="reset-btn">🔑 Reset Pass</button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </section>
        </section>
    </section>
</main>

<script th:src="@{/js/usermanagement.js}"></script>
</body>

</html>
